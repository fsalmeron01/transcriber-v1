version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: ./docker/web.Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_ROOT: ${STORAGE_ROOT}
      PUBLIC_DOWNLOAD_BASE_URL: ${PUBLIC_DOWNLOAD_BASE_URL}
      MAX_SOURCE_URL_LENGTH: ${MAX_SOURCE_URL_LENGTH}
    depends_on:
      - postgres
      - redis
    volumes:
      - app_data:/data
    restart: unless-stopped

  media-worker:
    build:
      context: .
      dockerfile: ./docker/media-worker.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_ROOT: ${STORAGE_ROOT}
      YTDLP_FORMAT: ${YTDLP_FORMAT}
      PUBLIC_DOWNLOAD_BASE_URL: ${PUBLIC_DOWNLOAD_BASE_URL}
    depends_on:
      - postgres
      - redis
    volumes:
      - app_data:/data
    restart: unless-stopped

  transcribe-worker:
    build:
      context: .
      dockerfile: ./docker/transcribe-worker.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_ROOT: ${STORAGE_ROOT}
      WHISPER_MODEL: ${WHISPER_MODEL}
      WHISPER_DEVICE: ${WHISPER_DEVICE}
      PUBLIC_DOWNLOAD_BASE_URL: ${PUBLIC_DOWNLOAD_BASE_URL}
    depends_on:
      - postgres
      - redis
    volumes:
      - app_data:/data
    restart: unless-stopped

  llm-worker:
    build:
      context: .
      dockerfile: ./docker/llm-worker.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  app_data:
  pg_data:
  redis_data:
